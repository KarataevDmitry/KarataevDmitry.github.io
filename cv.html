<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CV</title>
  <link rel="stylesheet" href="resume.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5/github-markdown.min.css" />
  <style>
    body { margin: 0; }
    .wrap { max-width: 980px; margin: 0 auto; padding: 1.25rem 1.5rem 2rem; }
    .topbar { display:flex; gap: .75rem; align-items:center; justify-content:space-between; margin: .5rem 0 1rem; }
    .topbar a { text-decoration: none; }
    .topbar a:hover { text-decoration: underline; }
    .markdown-body { box-sizing: border-box; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div><a href="/">← Home</a></div>
      <div><a href="cv.md">Raw Markdown</a></div>
    </div>
    <article id="content" class="markdown-body"></article>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="viewer.js"></script>
  <script>
    renderMarkdown({ mdPath: 'cv.md', title: 'CV — Каратаев Дмитрий' })
      .catch(err => {
        document.getElementById('content').textContent = String(err);
      });
  </script>
</body>
</html>
